version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lawai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lawai
      POSTGRES_USER: lawai
      POSTGRES_PASSWORD: lawai_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
