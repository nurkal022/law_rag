<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — LawVision Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f7f8fc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
        }
        .login-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #4f6ef7 0%, #7b5bf5 100%);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.2rem;
            margin: 0 auto 1.25rem;
        }
        h1 { font-size: 1.25rem; font-weight: 700; color: #0f172a; margin-bottom: 0.25rem; }
        .subtitle { font-size: 0.875rem; color: #64748b; margin-bottom: 1.75rem; }
        .form-control {
            border-radius: 10px;
            border: 1.5px solid #eef0f5;
            padding: 0.625rem 1rem;
            font-size: 0.875rem;
        }
        .form-control:focus {
            border-color: #4f6ef7;
            box-shadow: 0 0 0 3px rgba(79,110,247,0.1);
        }
        .form-label { font-size: 0.8125rem; font-weight: 500; color: #0f172a; margin-bottom: 0.375rem; }
        .btn-login {
            background: linear-gradient(135deg, #4f6ef7 0%, #7b5bf5 100%);
            border: none; color: white; border-radius: 10px;
            padding: 0.625rem; font-weight: 600; font-size: 0.875rem;
            width: 100%; cursor: pointer;
            box-shadow: 0 2px 12px rgba(79,110,247,0.3);
            transition: all 0.2s;
        }
        .btn-login:hover { filter: brightness(1.08); transform: translateY(-1px); }
        .alert-danger {
            background: rgba(220,38,38,0.08); border: none;
            color: #dc2626; border-radius: 10px; font-size: 0.875rem;
            padding: 0.625rem 1rem;
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <div class="login-icon">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
            </svg>
        </div>
        <h1>Панель администратора</h1>
        <p class="subtitle">LawVision — Управление системой</p>

        {% if error %}
        <div class="alert-danger mb-3">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/admin/login">
            <div class="text-start mb-3">
                <label class="form-label">Логин</label>
                <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
            </div>
            <div class="text-start mb-4">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Войти</button>
        </form>
    </div>
</body>
</html>
