{% extends "base.html" %}

{% block main_class %}p-0 m-0 auth-main{% endblock %}

{% block extra_css %}
<style>
/* Auth-страницы — полностью изолированы: без navbar/footer, fullscreen */
body { background: #0d0d10 !important; margin: 0; }
nav.navbar { display: none !important; }
footer.site-footer { display: none !important; }
main.auth-main { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }

.auth-shell {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1rem;
    background: radial-gradient(ellipse at top, rgba(79,110,247,0.22) 0%, transparent 55%),
                radial-gradient(ellipse at bottom right, rgba(124,92,255,0.18) 0%, transparent 50%),
                #0d0d10;
    position: relative;
}
/* Маленькая ссылка «← На главную» вверху слева */
.auth-back {
    position: absolute; top: 1.25rem; left: 1.25rem;
    color: rgba(255,255,255,0.55);
    font-size: 0.85rem; text-decoration: none;
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.4rem 0.75rem; border-radius: 8px;
    transition: background 0.15s, color 0.15s;
}
.auth-back:hover { background: rgba(255,255,255,0.06); color: #fff; }
.auth-card {
    width: 100%; max-width: 400px;
    background: #15161a;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 2.25rem 1.875rem;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}
.auth-logo {
    width: 64px; height: 64px;
    margin: 0 auto 1.25rem;
    background: #fff; border-radius: 50%; padding: 10px;
    box-shadow: 0 8px 24px rgba(79,110,247,0.3);
}
.auth-logo img { width: 100%; height: 100%; object-fit: contain; }
.auth-title {
    text-align: center; color: #fff;
    font-size: 1.35rem; font-weight: 700;
    margin-bottom: 0.375rem;
}
.auth-sub { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.875rem; margin-bottom: 1.5rem; }
.auth-form .form-label { color: rgba(255,255,255,0.7); font-size: 0.8125rem; font-weight: 500; margin-bottom: 0.375rem; }
.auth-form .form-control {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    border-radius: 10px;
    padding: 0.625rem 0.875rem;
    font-size: 0.9rem;
}
.auth-form .form-control:focus {
    background: rgba(255,255,255,0.07);
    border-color: rgba(79,110,247,0.6);
    box-shadow: 0 0 0 3px rgba(79,110,247,0.15);
    color: #fff;
}
.auth-btn {
    width: 100%;
    background: linear-gradient(135deg, #4f6ef7 0%, #7c5cff 100%);
    border: 0; border-radius: 10px;
    color: #fff; font-weight: 600;
    padding: 0.7rem;
    font-size: 0.95rem;
    transition: filter 0.15s, transform 0.1s;
}
.auth-btn:hover { filter: brightness(1.1); }
.auth-btn:active { transform: translateY(1px); }
.auth-divider {
    display: flex; align-items: center;
    color: rgba(255,255,255,0.3); font-size: 0.75rem;
    margin: 1.25rem 0 1rem;
    text-transform: uppercase; letter-spacing: 0.05em;
}
.auth-divider::before, .auth-divider::after {
    content: ''; flex: 1; height: 1px;
    background: rgba(255,255,255,0.1);
}
.auth-divider::before { margin-right: 0.875rem; }
.auth-divider::after  { margin-left: 0.875rem; }
.auth-google {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    border-radius: 10px;
    padding: 0.625rem;
    font-size: 0.875rem; font-weight: 500;
    display: flex; align-items: center; justify-content: center; gap: 0.625rem;
    text-decoration: none;
    transition: background 0.15s;
}
.auth-google:hover { background: rgba(255,255,255,0.08); color: #fff; }
.auth-google.disabled { opacity: 0.4; pointer-events: none; }
.auth-foot { text-align: center; margin-top: 1.25rem; font-size: 0.875rem; color: rgba(255,255,255,0.5); }
.auth-foot a { color: #a5b4fc; text-decoration: none; font-weight: 500; }
.auth-foot a:hover { text-decoration: underline; }
.auth-error {
    background: rgba(220,38,38,0.12);
    border: 1px solid rgba(220,38,38,0.3);
    color: #fca5a5;
    border-radius: 8px;
    padding: 0.625rem 0.875rem;
    font-size: 0.8125rem;
    margin-bottom: 1rem;
}
</style>
{% endblock %}

{% block content %}
<div class="auth-shell">
    <a href="/" class="auth-back"><i class="fas fa-arrow-left"></i> На главную</a>
    <div class="auth-card">
        <div class="auth-logo"><img src="/static/logo.png" alt="LawVision"></div>
        {% block auth_body %}{% endblock %}
    </div>
</div>
{% endblock %}
