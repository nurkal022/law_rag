{% extends "auth/_layout.html" %}
{% block title %}Вход — LawVision{% endblock %}

{% block auth_body %}
<h1 class="auth-title">С возвращением</h1>
<p class="auth-sub">Войдите в LawVision, чтобы продолжить работу</p>

{% if error %}<div class="auth-error">{{ error }}</div>{% endif %}

<form method="post" class="auth-form" autocomplete="on">
    <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" name="email" required autofocus
               class="form-control" value="{{ email or '' }}"
               placeholder="you@example.com">
    </div>
    <div class="mb-3">
        <label class="form-label" for="password">Пароль</label>
        <input type="password" id="password" name="password" required
               class="form-control" placeholder="••••••••">
    </div>
    <button type="submit" class="auth-btn">Войти</button>
</form>

<div class="auth-divider">или</div>
<a href="{{ url_for('auth.login_google') }}" class="auth-google disabled" title="Скоро будет доступно">
    <i class="fab fa-google"></i> Войти через Google
</a>

<p class="auth-foot">
    Ещё нет аккаунта? <a href="{{ url_for('auth.register') }}">Зарегистрироваться</a>
</p>
{% endblock %}
